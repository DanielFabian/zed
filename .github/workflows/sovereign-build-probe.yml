name: sovereign-build-probe

# Probe: can GitHub-hosted runners build the artifacts we actually need?
# Linux only needs headless/remote-server artifacts (both x86_64 and aarch64).
# macOS and Windows need GUI binaries. No signing, no notarization, no artifacts —
# we only want to know "does this complete?" Build times are visible in the GUI.
# Build times and pass/fail are visible in the Actions GUI.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build (default: integration)'
        required: false
        default: 'integration'

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.label }}
    timeout-minutes: 350
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64-remote-server
            os: ubuntu-latest
            kind: cargo-linux-remote
            target: x86_64-unknown-linux-musl
          - label: linux-aarch64-remote-server
            os: ubuntu-24.04-arm
            kind: cargo-linux-remote
            target: aarch64-unknown-linux-musl
          - label: darwin-aarch64-gui-nix
            os: macos-14
            kind: nix
          - label: windows-x86_64-gui-cargo
            os: windows-latest
            kind: cargo-windows
    runs-on: ${{ matrix.os }}
    steps:
      - name: Free disk space (linux)
        if: runner.os == 'Linux'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Checkout ${{ inputs.ref }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 1

      # --- Linux headless path (remote_server only) ------------------------

      - name: Configure Cargo paths (linux)
        if: matrix.kind == 'cargo-linux-remote'
        run: |
          mkdir -p "$GITHUB_WORKSPACE/.cargo-target"
          echo "CARGO_TARGET_DIR=$GITHUB_WORKSPACE/.cargo-target" >> "$GITHUB_ENV"

      - name: Install Linux build dependencies
        if: matrix.kind == 'cargo-linux-remote'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            cmake \
            curl \
            elfutils \
            gettext-base \
            git \
            g++ \
            gcc \
            jq \
            libasound2-dev \
            libfontconfig-dev \
            libgit2-dev \
            libglib2.0-dev \
            libsqlite3-dev \
            libssl-dev \
            libstdc++-14-dev \
            libva-dev \
            libvulkan1 \
            libwayland-dev \
            libx11-xcb-dev \
            libxkbcommon-x11-dev \
            libzstd-dev \
            lld \
            llvm \
            make \
            musl-dev \
            musl-tools \
            perl \
            pkg-config \
            zlib1g-dev

      - name: Install Rust (linux remote_server)
        if: matrix.kind == 'cargo-linux-remote'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cargo cache (linux remote_server)
        if: matrix.kind == 'cargo-linux-remote'
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: sovereign-zed-remote-server-${{ matrix.target }}

      - name: cargo build remote_server (linux)
        if: matrix.kind == 'cargo-linux-remote'
        run: cargo build --release --package remote_server --target ${{ matrix.target }}

      # --- Nix GUI path (darwin) -------------------------------------------

      - name: Install Nix
        if: matrix.kind == 'nix'
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            accept-flake-config = true

      - name: nix build .#default
        if: matrix.kind == 'nix'
        run: nix build .#default --accept-flake-config --print-build-logs

      # --- Windows path (cargo, no bundle/sign) ----------------------------

      - name: Enable Win32 long paths (windows)
        if: matrix.kind == 'cargo-windows'
        shell: pwsh
        run: |
          # 1. Filesystem-level long paths (registry, requires admin — GH runners run elevated)
          New-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem' `
            -Name 'LongPathsEnabled' -Value 1 -PropertyType DWORD -Force | Out-Null
          # 2. Git long paths
          git config --global core.longpaths true
          # 3. Move cargo + target to short roots on the big D: drive.
          #    The pet-conda test fixtures bury paths ~250 chars below CARGO_HOME,
          #    so the prefix has to be as short as possible.
          New-Item -ItemType Directory -Force -Path D:\c | Out-Null
          New-Item -ItemType Directory -Force -Path D:\t | Out-Null
          Add-Content -Path $env:GITHUB_ENV -Value "CARGO_HOME=D:\c"
          Add-Content -Path $env:GITHUB_ENV -Value "CARGO_TARGET_DIR=D:\t"
          Add-Content -Path $env:GITHUB_PATH -Value "D:\c\bin"

      - name: Install Rust (windows)
        if: matrix.kind == 'cargo-windows'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cargo cache (windows)
        if: matrix.kind == 'cargo-windows'
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: sovereign-zed-windows

      - name: cargo build --release (windows)
        if: matrix.kind == 'cargo-windows'
        shell: pwsh
        run: cargo build --release --bin zed --target x86_64-pc-windows-msvc
