name: sovereign-build-probe

# Probe: can GitHub-hosted runners build the artifacts we actually need?
#
# Matrix is the closure floor of where Dany actually runs code:
#   - darwin-aarch64 GUI       (personal mac, work MacBook Pro)
#   - windows-x86_64 GUI       (work / personal laptop)
#   - linux-x86_64  GUI bundle (Hyper-V backend / codespace)
#   - linux-aarch64 GUI bundle (MacBook Pro VM backend)
#
# Goal of this iteration: match upstream's run_bundling.yml as closely as
# possible, so we measure Zed's *real* build, not an ad-hoc reinvention.
# Earlier probe used `nix build .#default` for macOS, which exploded /nix/store
# on a cold runner and failed for disk-space reasons — upstream itself runs
# `./script/bundle-mac` (cargo-direct) and reserves the nix flake build as a
# `continue-on-error` side experiment gated to `zed-industries` only.
#
# No signing/notarization secrets are configured here. The bundle scripts are
# expected to:
#   - macOS:  produce an unsigned .app and DMG (bundle-mac guards signing on env)
#   - Linux:  unaffected by signing
#   - Windows: bundle-windows.ps1 hard-fails when CI=1 and AZURE_* are absent;
#             therefore we run the cargo subset it would have compiled rather
#             than calling the script. Honest signal: "does it compile?",
#             without lying to the script's env preflight.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build (default: integration)'
        required: false
        default: 'integration'

permissions:
  contents: read

defaults:
  run:
    # Match upstream: trace + fail-fast pipelines. Helps diagnose surprises.
    shell: bash -euxo pipefail {0}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: '0'
  RUST_BACKTRACE: '1'

jobs:
  build:
    name: ${{ matrix.label }}
    timeout-minutes: 350
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64-gui
            os: ubuntu-latest
            kind: linux-bundle
          - label: linux-aarch64-gui
            os: ubuntu-24.04-arm
            kind: linux-bundle
          - label: darwin-aarch64-gui
            os: macos-14
            kind: mac-bundle
            mac_target: aarch64-apple-darwin
          - label: windows-x86_64-gui
            os: windows-latest
            kind: windows-cargo
    runs-on: ${{ matrix.os }}
    env:
      # Required by bundle-windows.ps1 even though we don't invoke it directly
      # for this probe; harmless on other platforms.
      ZED_WORKSPACE: ${{ github.workspace }}
    steps:
      - name: Free disk space (linux)
        if: runner.os == 'Linux'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Checkout ${{ inputs.ref }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 1
          # Match upstream: don't wipe target/ between checkouts.
          clean: false

      # --- Linux GUI bundle (upstream-script-equivalent) -------------------
      # Mirrors run_bundling.yml::bundle_linux_*:
      #   ./script/linux            (install build deps incl. pipewire/xdg portal)
      #   ./script/download-wasi-sdk
      #   ./script/bundle-linux     (produces target/release/zed-linux-<arch>.tar.gz
      #                              and target/zed-remote-server-linux-<arch>.gz)

      - name: Install Rust toolchain (linux)
        if: matrix.kind == 'linux-bundle'
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache (linux)
        if: matrix.kind == 'linux-bundle'
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: sovereign-zed-linux-${{ matrix.os }}

      - name: ./script/linux
        if: matrix.kind == 'linux-bundle'
        env:
          # The script unconditionally calls `apt-get install` under sudo; on
          # GH-hosted runners that's fine. It also runs `rustup` at the end to
          # ensure a toolchain — harmless given dtolnay/rust-toolchain above.
          CC: clang
          CXX: clang++
        run: ./script/linux

      - name: ./script/download-wasi-sdk
        if: matrix.kind == 'linux-bundle'
        run: ./script/download-wasi-sdk

      - name: ./script/bundle-linux
        if: matrix.kind == 'linux-bundle'
        env:
          CC: clang
          CXX: clang++
        run: ./script/bundle-linux

      - name: Show linux artifacts
        if: matrix.kind == 'linux-bundle'
        run: |
          ls -lh target/release/zed-linux-*.tar.gz 2>/dev/null || true
          ls -lh target/zed-remote-server-linux-*.gz 2>/dev/null || true

      # --- macOS GUI bundle (upstream cargo path, no nix) ------------------
      # Mirrors run_bundling.yml::bundle_mac_aarch64. bundle-mac internally
      # checks for the five MACOS_*/APPLE_* env vars before attempting any
      # codesign/notarytool work — absent => unsigned build, completes normally.

      - name: Setup Node (mac)
        if: matrix.kind == 'mac-bundle'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust toolchain (mac)
        if: matrix.kind == 'mac-bundle'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.mac_target }}

      - name: Cargo cache (mac)
        if: matrix.kind == 'mac-bundle'
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: sovereign-zed-mac-${{ matrix.mac_target }}

      - name: ./script/clear-target-dir-if-larger-than 350 200
        if: matrix.kind == 'mac-bundle'
        run: ./script/clear-target-dir-if-larger-than 350 200

      - name: ./script/bundle-mac ${{ matrix.mac_target }}
        if: matrix.kind == 'mac-bundle'
        run: ./script/bundle-mac ${{ matrix.mac_target }}

      - name: Show mac artifacts
        if: matrix.kind == 'mac-bundle'
        run: |
          find target -maxdepth 4 \( -name 'Zed-*.dmg' -o -name 'zed-remote-server-macos-*.gz' \) -exec ls -lh {} +

      # --- Windows cargo subset (no installer, no signing) -----------------
      # bundle-windows.ps1 requires AZURE_* signing creds when CI=1; we don't
      # have those (yet). Run the exact same compilation step that script
      # performs so the probe answers "does it compile?" honestly, without
      # stubbing signing creds or unsetting CI.

      - name: Enable Win32 long paths (windows)
        if: matrix.kind == 'windows-cargo'
        shell: pwsh
        run: |
          New-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem' `
            -Name 'LongPathsEnabled' -Value 1 -PropertyType DWORD -Force | Out-Null
          git config --global core.longpaths true
          # Move cargo + target to short roots on the larger D: drive.
          New-Item -ItemType Directory -Force -Path D:\c | Out-Null
          New-Item -ItemType Directory -Force -Path D:\t | Out-Null
          Add-Content -Path $env:GITHUB_ENV -Value "CARGO_HOME=D:\c"
          Add-Content -Path $env:GITHUB_ENV -Value "CARGO_TARGET_DIR=D:\t"
          Add-Content -Path $env:GITHUB_PATH -Value "D:\c\bin"

      - name: Install Rust (windows)
        if: matrix.kind == 'windows-cargo'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cargo cache (windows)
        if: matrix.kind == 'windows-cargo'
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: sovereign-zed-windows

      - name: cargo build --release (windows, bundle-windows.ps1 subset)
        if: matrix.kind == 'windows-cargo'
        shell: pwsh
        run: |
          # Same packages bundle-windows.ps1 builds before invoking Inno + sign.
          cargo build --release `
            --package zed --package cli --package auto_update_helper `
            --target x86_64-pc-windows-msvc
