name: sovereign-build-probe

# Probe: can the four target platforms build composed `integration` on
# GitHub-hosted runners at all? No bundling, no signing, no artifacts —
# we only want to know "does this complete, and roughly how long?"
# Build times and pass/fail are visible in the Actions GUI.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build (default: integration)'
        required: false
        default: 'integration'

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.label }}
    timeout-minutes: 350
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64-nix
            os: ubuntu-latest
            kind: nix
          - label: linux-aarch64-nix
            os: ubuntu-24.04-arm
            kind: nix
          - label: darwin-aarch64-nix
            os: macos-14
            kind: nix
          - label: windows-x86_64-cargo
            os: windows-latest
            kind: cargo-windows
    runs-on: ${{ matrix.os }}
    steps:
      - name: Free disk space (linux)
        if: runner.os == 'Linux'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Checkout ${{ inputs.ref }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 1

      # --- Nix path (linux + darwin) ---------------------------------------

      - name: Install Nix
        if: matrix.kind == 'nix'
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            accept-flake-config = true

      - name: nix build .#default
        if: matrix.kind == 'nix'
        run: nix build .#default --accept-flake-config --print-build-logs

      # --- Windows path (cargo, no bundle/sign) ----------------------------

      - name: Enable Win32 long paths (windows)
        if: matrix.kind == 'cargo-windows'
        shell: pwsh
        run: |
          # 1. Filesystem-level long paths (registry, requires admin — GH runners run elevated)
          New-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem' `
            -Name 'LongPathsEnabled' -Value 1 -PropertyType DWORD -Force | Out-Null
          # 2. Git long paths
          git config --global core.longpaths true
          # 3. Move cargo + target to short roots on the big D: drive.
          #    The pet-conda test fixtures bury paths ~250 chars below CARGO_HOME,
          #    so the prefix has to be as short as possible.
          New-Item -ItemType Directory -Force -Path D:\c | Out-Null
          New-Item -ItemType Directory -Force -Path D:\t | Out-Null
          Add-Content -Path $env:GITHUB_ENV -Value "CARGO_HOME=D:\c"
          Add-Content -Path $env:GITHUB_ENV -Value "CARGO_TARGET_DIR=D:\t"
          Add-Content -Path $env:GITHUB_PATH -Value "D:\c\bin"

      - name: Install Rust (windows)
        if: matrix.kind == 'cargo-windows'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cargo cache (windows)
        if: matrix.kind == 'cargo-windows'
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: sovereign-zed-windows

      - name: cargo build --release (windows)
        if: matrix.kind == 'cargo-windows'
        shell: pwsh
        run: cargo build --release --bin zed --target x86_64-pc-windows-msvc
